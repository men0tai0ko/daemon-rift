<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="application-name" content="DAEMON RIFT">
<meta name="version" content="0.5.1">
<meta name="author" content="ののやま">
<title>DAEMON RIFT</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="app">
  <div id="screen-title" class="screen active">
    <div class="title-demon-art">👁️</div>
    <div class="title-glitch">DAEMON RIFT</div>
    <div class="title-sub">廃都の悪魔</div>
    <div class="title-buttons">
      <button class="btn primary" onclick="G.startNewGame()">▶ 新規ゲーム</button>
      <button class="btn" id="btn-continue" onclick="G.continueGame()" style="display:none">↩ コンティニュー</button>
    </div>
    <div class="title-version" id="title-version"></div>
  </div>

  <div id="screen-explore" class="screen">
    <div class="explore-header">
      <div class="floor-info">
        <span class="floor-num" id="floor-display">B1F</span>
        <span class="floor-label" id="area-name">廃都表層</span>
      </div>
      <div class="header-stats"><span class="macca-display">₪ <span id="macca-display">0</span></span></div>
      <div class="header-btns">
        <button class="btn" id="btn-mute" onclick="AUDIO.toggleMute();this.textContent=AUDIO.isMuted?'🔇':'🔊'" style="padding:8px 10px;font-size:11px;">🔊</button>
        <button class="btn" style="padding:8px 10px;font-size:11px;" onclick="G.showScreen('screen-party')">仲魔</button>
        <button class="btn" style="padding:8px 10px;font-size:11px;" onclick="G.showScreen('screen-fusion')">合体</button>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label"><span id="progress-label-text">フロア進行</span><span id="progress-label-num">0 / 5</span></div>
      <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
    </div>
    <div class="explore-log" id="explore-log"><div class="log-entry system">— 探索を開始する —</div></div>
    <div class="party-bar">
      <div class="party-label">PARTY</div>
      <div class="party-list" id="party-list"></div>
    </div>
    <div class="explore-controls">
      <button class="btn primary" id="btn-explore-toggle" onclick="G.toggleExplore()">▶ 探索開始</button>
      <button class="btn warn" onclick="G.showScreen('screen-fusion')">⚗ 合体</button>
    </div>
  </div>

  <div id="screen-battle" class="screen">
    <div class="battle-header">
      <div class="battle-floor" id="battle-floor-text">B1F</div>
      <div class="battle-title" id="battle-title-text">ENCOUNTER</div>
    </div>
    <div class="battle-enemy-area">
      <div class="enemy-display"><div class="enemy-sprite" id="enemy-sprite">👿</div></div>
      <div class="enemy-info">
        <div class="enemy-name" id="enemy-name">???</div>
        <div class="enemy-tags">
          <span class="tag race-tag" id="enemy-race-tag">???</span>
          <span class="tag" id="enemy-attr-tag">???</span>
        </div>
        <div class="enemy-hp-wrap"><div class="enemy-hp-bar" id="enemy-hp-bar" style="width:100%"></div></div>
        <div class="enemy-hp-text" id="enemy-hp-text">HP: -- / --</div>
      </div>
    </div>
    <div class="battle-log-area"><div class="battle-log-text" id="battle-log">...</div></div>
    <div class="negotiate-panel" id="negotiate-panel">
      <div class="negotiate-title">▌ 交渉方法を選べ</div>
      <div class="negotiate-opts">
        <button class="btn"         id="btn-neg-flatter"  onclick="G.doNegotiate('おだてる')">😊 おだてる（45%）</button>
        <button class="btn warn"    id="btn-neg-threaten" onclick="G.doNegotiate('脅す')">😤 脅す（25%）</button>
        <button class="btn success" id="btn-neg-money"    onclick="G.doNegotiate('金で解決')">💰 マッカを渡す（65%）</button>
        <button class="btn"         onclick="G.cancelNegotiate()">✕ キャンセル</button>
      </div>
    </div>
    <!-- スキル選択パネル（2スキル保持時に表示） -->
    <div class="negotiate-panel" id="skill-panel">
      <div class="negotiate-title">▌ スキルを選べ</div>
      <div class="negotiate-opts" id="skill-panel-list"></div>
      <button class="btn" style="margin-top:4px;" onclick="G.cancelSkillPanel()">✕ キャンセル</button>
    </div>
    <!-- アイテムパネル（negotiate-panelと同パターン） -->
    <div class="negotiate-panel" id="item-panel">
      <div class="negotiate-title">▌ アイテムを使う</div>
      <div class="negotiate-opts" id="item-panel-list"></div>
      <button class="btn" style="margin-top:4px;" onclick="G.cancelItemPanel()">✕ キャンセル</button>
    </div>
    <div class="battle-actions" id="battle-actions">
      <div class="action-row">
        <button class="btn primary" onclick="G.doAttack()">⚔ 攻撃</button>
        <button class="btn"         onclick="G.startNegotiate()">💬 話す</button>
      </div>
      <div class="action-row">
        <button class="btn"          onclick="G.doFlee()">🏃 逃げる</button>
        <button class="btn disabled" id="btn-skill" onclick="G.doSkill()">✨ スキル</button>
      </div>
      <!-- アイテムボタン行を追加 -->
      <div class="action-row">
        <button class="btn" id="btn-battle-item" onclick="G.startItemPanel()">🎒 アイテム</button>
      </div>
    </div>
  </div>

  <div id="screen-fusion" class="screen">
    <div class="fusion-header">
      <button class="btn" style="padding:8px 12px;font-size:12px;" onclick="G.backToExplore()">← 戻る</button>
      <span class="fusion-header-title">⚗ 合体ラボ</span>
    </div>
    <div class="fusion-content">
      <div class="fusion-slots">
        <div class="fusion-slot" id="fusion-slot-a" onclick="G.selectFusionSlot('a')">
          <div class="fusion-slot-emoji" id="fusion-slot-a-emoji">＋</div>
          <div class="fusion-slot-name"  id="fusion-slot-a-name">素材 A</div>
          <div class="fusion-slot-info"  id="fusion-slot-a-info">タップで選択</div>
        </div>
        <div class="fusion-arrow">×</div>
        <div class="fusion-slot" id="fusion-slot-b" onclick="G.selectFusionSlot('b')">
          <div class="fusion-slot-emoji" id="fusion-slot-b-emoji">＋</div>
          <div class="fusion-slot-name"  id="fusion-slot-b-name">素材 B</div>
          <div class="fusion-slot-info"  id="fusion-slot-b-info">タップで選択</div>
        </div>
      </div>
      <div class="fusion-result-preview" id="fusion-preview">
        <div class="fusion-result-label">▌ 合体結果プレビュー</div>
        <div class="fusion-result-emoji" id="fusion-result-emoji">?</div>
        <div class="fusion-result-name"  id="fusion-result-name">???</div>
        <div class="fusion-result-skill" id="fusion-result-skill"></div>
        <button class="btn primary" id="btn-fusion-exec" style="margin-top:12px;width:100%;" onclick="G.executeFusion()">⚡ 合体実行</button>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px;letter-spacing:1px;">▌ 仲魔一覧（タップで素材選択）</div>
      <div class="fusion-demon-list" id="fusion-demon-list"></div>
    </div>
  </div>

  <div id="screen-party" class="screen">
    <div class="party-screen-header">
      <button class="btn" style="padding:8px 12px;font-size:12px;" onclick="G.backToExplore()">← 戻る</button>
      <span class="party-screen-title">仲魔一覧</span>
    </div>
    <div class="party-tabs">
      <button class="party-tab active" id="tab-party" onclick="UI.switchPartyTab('party')">仲魔</button>
      <button class="party-tab" id="tab-item" onclick="UI.switchPartyTab('item')">アイテム</button>
    </div>
    <div class="party-screen-content" id="party-screen-content"></div>
    <div class="party-screen-content" id="party-item-content" style="display:none"></div>
  </div>

  <div id="screen-gameover" class="screen">
    <div class="gameover-title">DEAD</div>
    <div class="gameover-sub">仲魔は全滅した…</div>
    <div class="gameover-stats">
      <div class="gameover-stat-row"><span>到達深度</span>    <span id="go-floor">B1F</span></div>
      <div class="gameover-stat-row"><span>最大深度記録</span><span id="go-best">B1F</span></div>
      <div class="gameover-stat-row"><span>撃破数</span>      <span id="go-kills">0</span></div>
      <div class="gameover-stat-row"><span>合体回数</span>    <span id="go-fusions">0</span></div>
      <!-- ISS-009: 次回引継マッカ表示行 -->
      <div class="gameover-stat-row"><span>次回引継額</span>  <span id="go-legacy">₪ 0</span></div>
    </div>
    <button class="btn primary" style="width:100%;" onclick="G.startNewGame()">▶ もう一度</button>
    <button class="btn"         style="width:100%;" onclick="G.showScreen('screen-title')">タイトルへ</button>
  </div>
</div>
<div id="toast"></div>

<script src="./script.js" defer></script>
</body>
</html>
