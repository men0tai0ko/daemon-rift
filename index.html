<!--
================================================================
  DAEMON RIFT 廃都の悪魔
  Version : 0.3.3
  Updated : 2026-03-20
  Author  : ののやま
================================================================
  CHANGELOG
  v0.3.3 (2026-03-20)
    - AUDIOモジュール追加（Web Audio API 手続き型生成）
        BGM: 探索（ドローン）/ 戦闘（通常・ボス）
        SE:  攻撃・被ダメ・弱点・逃走・交渉成功・レベルアップ
             合体・全滅・階層上昇
        ミュートトグル（localStorage 保存）
    - ANIMモジュール追加（CSS エフェクト）
        画面遷移フェードイン・属性カラーフラッシュ・弱点フラッシュ
        ダメージ数値フロート・レベルアップバナー・合体演出・シェイク
    - keyframes 追加（floatUp / bannerPop / fusionSpin / fadeIn / shake）
  v0.3.2 (2026-03-20)
    - UIモジュール（UIオブジェクト）をグローバル関数群から独立分離
      (renderExplore / renderPartyBar / renderEnemyHP / setBattleLog /
       addLog / playEnemyHitAnim / renderFusionScreen / renderPartyScreen)
    - グローバル関数はUI.xxxへの後方互換ラッパーとして残置
    - Phase 3 アニメーション追加の受け皿を整備
  v0.3.1 (2026-03-20)
    - FUSIONモジュールをGから独立分離
      (selectSlot / selectDemon / execute / toggleParty)
    - GはFUSION.xxxへの委譲のみ保持（後方互換維持）
  v0.3.0 (2026-03-20)
    - BATTLEモジュールをGから独立分離
      (open / attack / skill / flee / negotiate / _enemyAttack / _enemyDefeated / _checkGameOver)
    - GはBATTLE.xxxへの委譲のみ保持（後方互換維持）
  v0.2.1 (2026-03-20)
    - SAVEブロックに SAVE_SCHEMA_VERSION を導入
    - loadGame() でスキーマ不一致時に旧データを安全破棄するバリデーション追加
    - saveGame() の保存データに _sv フィールドを付与
  v0.2.0 (2026-03-20)
    - バージョン管理をコメントヘッダー/metaタグ/タイトル画面に統合
    - STATEをSAVE_KEYS(保存対象)とランタイムに明示分離
    - JSを責務別ブロック(DATA/UTIL/ENGINE/SAVE/UI/CONTROLLER)に再編
    - セーブ/ロードに簡易バリデーション追加
    - 定数(AFFINITY/FUSION_TABLE/AREAS)をDATAブロックへ集約
    - 内部処理メソッドを _prefix で区別
  v0.1.0 (2026-03-20)
    - プロトタイプ初版
================================================================
-->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="application-name" content="DAEMON RIFT">
<meta name="version" content="0.3.3">
<meta name="author" content="ののやま">
<title>DAEMON RIFT</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a28;
  --red:#c0392b;--purple:#8e44ad;--green:#27ae60;--orange:#e67e22;
  --text:#e8e8e8;--muted:#888;--border:#2a2a40;--gold:#f1c40f;--cyan:#00d4ff;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Courier New','Noto Sans JP',monospace;overflow:hidden;touch-action:manipulation}
#app{width:100%;height:100%;max-width:420px;margin:0 auto;display:flex;flex-direction:column;position:relative;overflow:hidden}
.screen{display:none;flex-direction:column;height:100%}
.screen.active{display:flex}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 20px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:inherit;font-size:14px;cursor:pointer;border-radius:4px;transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none;min-height:44px}
.btn:active{transform:scale(.96)}
.btn.primary{border-color:var(--red);color:var(--red)}
.btn.primary:active{background:var(--red);color:#fff}
.btn.success{border-color:var(--green);color:var(--green)}
.btn.warn{border-color:var(--orange);color:var(--orange)}
.btn.disabled{opacity:.3;pointer-events:none}
.tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:bold}
/* title */
#screen-title{background:radial-gradient(ellipse at 50% 30%,#1a0a2e 0%,var(--bg) 70%);align-items:center;justify-content:center;gap:0}
.title-glitch{font-size:42px;font-weight:bold;letter-spacing:6px;color:var(--red);text-shadow:0 0 20px rgba(192,57,43,.8),0 0 40px rgba(192,57,43,.4);animation:glitch 4s infinite;margin-bottom:6px}
.title-sub{font-size:12px;letter-spacing:4px;color:var(--purple);margin-bottom:60px}
@keyframes glitch{0%,90%,100%{text-shadow:0 0 20px rgba(192,57,43,.8),0 0 40px rgba(192,57,43,.4)}92%{text-shadow:-3px 0 var(--cyan),3px 0 var(--purple);transform:skewX(-2deg)}94%{text-shadow:3px 0 var(--cyan),-3px 0 var(--red);transform:skewX(1deg)}96%{text-shadow:0 0 20px rgba(192,57,43,.8);transform:skewX(0)}}
.title-buttons{display:flex;flex-direction:column;gap:12px;width:200px}
.title-demon-art{font-size:80px;margin-bottom:20px;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(142,68,173,.6))}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.title-version{position:absolute;bottom:16px;font-size:10px;color:var(--muted)}
/* explore */
#screen-explore{background:var(--bg)}
.explore-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.floor-info{display:flex;flex-direction:column}
.floor-num{font-size:20px;font-weight:bold;color:var(--cyan);letter-spacing:2px}
.floor-label{font-size:10px;color:var(--muted);letter-spacing:1px}
.macca-display{font-size:13px;color:var(--gold)}
.header-btns{display:flex;gap:6px}
.explore-log{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth}
.log-entry{font-size:12px;line-height:1.6;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
.log-entry.encounter{color:var(--red)}.log-entry.success{color:var(--green)}.log-entry.warn{color:var(--orange)}.log-entry.system{color:var(--purple)}.log-entry.boss{color:var(--gold);font-weight:bold}
.party-bar{background:var(--bg2);border-top:1px solid var(--border);padding:10px 14px}
.party-label{font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:6px}
.party-list{display:flex;gap:8px}
.party-card{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px;min-width:0;transition:border-color .2s}
.party-card.empty{opacity:.3;border-style:dashed}.party-card.dead{border-color:var(--red);opacity:.5}
.party-card-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.party-demon-emoji{font-size:22px}.party-demon-info{min-width:0}
.party-demon-name{font-size:11px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.party-demon-lv{font-size:10px;color:var(--muted)}
.hp-bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.hp-bar{height:100%;background:var(--green);border-radius:2px;transition:width .4s,background .4s}
.hp-bar.low{background:var(--orange)}.hp-bar.critical{background:var(--red)}
.explore-controls{background:var(--bg2);border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:8px}
.explore-controls .btn{flex:1}
.progress-wrap{padding:6px 14px;background:var(--bg2);border-top:1px solid var(--border)}
.progress-label{font-size:10px;color:var(--muted);margin-bottom:4px;display:flex;justify-content:space-between}
.progress-bar-bg{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--purple),var(--cyan));border-radius:3px;transition:width 1s linear}
/* battle */
#screen-battle{background:radial-gradient(ellipse at 50% 20%,#1a0018 0%,var(--bg) 60%)}
.battle-header{padding:12px 14px;background:rgba(0,0,0,.4);border-bottom:1px solid var(--border);text-align:center}
.battle-floor{font-size:11px;color:var(--muted);letter-spacing:2px}
.battle-title{font-size:14px;color:var(--red);letter-spacing:1px}
.battle-enemy-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px}
.enemy-display{width:120px;height:120px;display:flex;align-items:center;justify-content:center}
.enemy-sprite{font-size:70px;filter:drop-shadow(0 0 20px rgba(192,57,43,.6));animation:enemyFloat 2s ease-in-out infinite}
.enemy-sprite.boss{font-size:85px;filter:drop-shadow(0 0 30px rgba(241,196,15,.8))}
@keyframes enemyFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-6px) scale(1.02)}}
.enemy-hit{animation:hit .3s ease !important}
@keyframes hit{0%{transform:translateX(0);filter:brightness(3)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}100%{transform:translateX(0);filter:brightness(1)}}
.enemy-info{text-align:center}.enemy-name{font-size:18px;font-weight:bold;color:var(--text);margin-bottom:2px}
.enemy-tags{display:flex;gap:6px;justify-content:center;margin-bottom:8px}
.enemy-hp-wrap{width:200px;height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin:0 auto}
.enemy-hp-bar{height:100%;background:linear-gradient(90deg,var(--red),var(--orange));border-radius:4px;transition:width .4s}
.enemy-hp-text{font-size:11px;color:var(--muted);margin-top:4px}
.battle-log-area{padding:8px 14px;min-height:50px;max-height:70px;overflow:hidden}
.battle-log-text{font-size:13px;line-height:1.6;color:var(--text);animation:fadeIn .2s ease}
.battle-actions{background:var(--bg2);border-top:1px solid var(--border);padding:12px 14px}
.action-row{display:flex;gap:8px;margin-bottom:8px}
.action-row:last-child{margin-bottom:0}
.action-row .btn{flex:1;font-size:13px}
.negotiate-panel{display:none;background:var(--bg2);border-top:1px solid var(--border);padding:10px 14px}
.negotiate-panel.active{display:block}
.negotiate-title{font-size:11px;color:var(--purple);letter-spacing:1px;margin-bottom:8px}
.negotiate-opts{display:flex;flex-direction:column;gap:6px}
.negotiate-opts .btn{font-size:12px}
/* fusion */
#screen-fusion{background:radial-gradient(ellipse at 50% 0%,#0d001a 0%,var(--bg) 60%)}
.fusion-header{padding:12px 14px;background:rgba(0,0,0,.4);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.fusion-header-title{font-size:15px;font-weight:bold;color:var(--purple);letter-spacing:2px}
.fusion-content{flex:1;overflow-y:auto;padding:14px}
.fusion-slots{display:flex;gap:10px;align-items:center;margin-bottom:16px}
.fusion-slot{flex:1;background:var(--bg3);border:1px dashed var(--border);border-radius:8px;padding:12px;text-align:center;cursor:pointer;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:border-color .2s}
.fusion-slot.filled{border-style:solid;border-color:var(--purple)}.fusion-slot:active{background:#1e1e2e}
.fusion-slot-emoji{font-size:32px}.fusion-slot-name{font-size:12px;font-weight:bold}.fusion-slot-info{font-size:10px;color:var(--muted)}
.fusion-arrow{font-size:20px;color:var(--purple);flex-shrink:0}
.fusion-result-preview{background:var(--bg3);border:1px solid var(--purple);border-radius:8px;padding:14px;text-align:center;margin-bottom:14px;display:none}
.fusion-result-preview.active{display:block}
.fusion-result-label{font-size:10px;color:var(--purple);letter-spacing:2px;margin-bottom:8px}
.fusion-result-emoji{font-size:48px;margin-bottom:4px}.fusion-result-name{font-size:18px;font-weight:bold;color:var(--gold)}.fusion-result-skill{font-size:11px;color:var(--cyan);margin-top:4px}
.fusion-demon-list{display:flex;flex-direction:column;gap:6px}
.fusion-demon-item{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .2s}
.fusion-demon-item:active{border-color:var(--purple)}.fusion-demon-item.selected{border-color:var(--purple);background:#1e1230}
.fusion-demon-item .emoji{font-size:28px}.fusion-demon-item .info{flex:1}
.fusion-demon-item .dname{font-size:13px;font-weight:bold}.fusion-demon-item .ddetail{font-size:11px;color:var(--muted)}.fusion-demon-item .dskill{font-size:10px;color:var(--cyan)}
/* party screen */
#screen-party{background:var(--bg)}
.party-screen-header{padding:12px 14px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.party-screen-title{font-size:15px;font-weight:bold;color:var(--cyan);letter-spacing:2px}
.party-screen-content{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
.demon-card-full{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;gap:12px;align-items:center}
.demon-card-full.in-party{border-color:var(--cyan)}.demon-card-full .emoji{font-size:38px;flex-shrink:0}.demon-card-full .info{flex:1;min-width:0}
.demon-card-full .dname{font-size:14px;font-weight:bold;margin-bottom:2px}
.demon-card-full .dtags{display:flex;gap:4px;margin-bottom:4px;flex-wrap:wrap}
.demon-card-full .dstats{font-size:11px;color:var(--muted);margin-bottom:4px}
.demon-card-full .dskills{font-size:11px;color:var(--cyan)}.demon-card-full .dhp{margin-top:4px}
.demon-card-full .action-btn{flex-shrink:0;font-size:11px;padding:6px 10px;min-height:36px}
/* gameover */
#screen-gameover{background:radial-gradient(ellipse at 50% 40%,#200000 0%,var(--bg) 70%);align-items:center;justify-content:center;gap:20px;text-align:center;padding:40px}
.gameover-title{font-size:36px;font-weight:bold;color:var(--red);letter-spacing:4px}
.gameover-sub{font-size:13px;color:var(--muted)}
.gameover-stats{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:20px;width:100%}
.gameover-stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.gameover-stat-row:last-child{border-bottom:none}
.gameover-stat-row span:last-child{color:var(--gold);font-weight:bold}
/* attr tags */
.attr-炎{background:rgba(230,126,34,.25);color:var(--orange)}.attr-氷{background:rgba(0,212,255,.15);color:var(--cyan)}
.attr-電{background:rgba(241,196,15,.2);color:var(--gold)}.attr-物{background:rgba(232,232,232,.15);color:var(--text)}
.attr-呪{background:rgba(142,68,173,.3);color:var(--purple)}
.race-tag{background:rgba(255,255,255,.08);color:var(--muted)}.party-tag{background:rgba(0,212,255,.15);color:var(--cyan);font-size:9px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid var(--border);padding:8px 16px;border-radius:20px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;z-index:100}
#toast.show{opacity:1}

/* ---- ANIM keyframes ---- */
@keyframes floatUp {
  0%   { opacity:1; transform:translateX(-50%) translateY(0); }
  100% { opacity:0; transform:translateX(-50%) translateY(-40px); }
}
@keyframes bannerPop {
  0%   { opacity:0; transform:translateX(-50%) scale(.7); }
  20%  { opacity:1; transform:translateX(-50%) scale(1.05); }
  80%  { opacity:1; transform:translateX(-50%) scale(1); }
  100% { opacity:0; transform:translateX(-50%) scale(.9); }
}
@keyframes fusionSpin {
  0%   { transform:scale(0) rotate(-180deg); opacity:0; }
  70%  { transform:scale(1.2) rotate(10deg); opacity:1; }
  100% { transform:scale(1) rotate(0deg); opacity:1; }
}
@keyframes fadeIn {
  from { opacity:0; } to { opacity:1; }
}
@keyframes shake {
  0%,100% { transform:translateX(0); }
  20%     { transform:translateX(-6px); }
  40%     { transform:translateX(6px); }
  60%     { transform:translateX(-4px); }
  80%     { transform:translateX(4px); }
}
</style>
</head>
<body>
<div id="app">
  <div id="screen-title" class="screen active">
    <div class="title-demon-art">👁️</div>
    <div class="title-glitch">DAEMON RIFT</div>
    <div class="title-sub">廃都の悪魔</div>
    <div class="title-buttons">
      <button class="btn primary" onclick="G.startNewGame()">▶ 新規ゲーム</button>
      <button class="btn" id="btn-continue" onclick="G.continueGame()" style="display:none">↩ コンティニュー</button>
    </div>
    <div class="title-version" id="title-version"></div>
  </div>

  <div id="screen-explore" class="screen">
    <div class="explore-header">
      <div class="floor-info">
        <span class="floor-num" id="floor-display">B1F</span>
        <span class="floor-label" id="area-name">廃都表層</span>
      </div>
      <div class="header-stats"><span class="macca-display">₪ <span id="macca-display">0</span></span></div>
      <div class="header-btns">
        <button class="btn" id="btn-mute" onclick="AUDIO.toggleMute();this.textContent=AUDIO.isMuted?'🔇':'🔊'" style="padding:8px 10px;font-size:11px;">🔊</button>
        <button class="btn" style="padding:8px 10px;font-size:11px;" onclick="G.showScreen('screen-party')">仲魔</button>
        <button class="btn" style="padding:8px 10px;font-size:11px;" onclick="G.showScreen('screen-fusion')">合体</button>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label"><span id="progress-label-text">フロア進行</span><span id="progress-label-num">0 / 5</span></div>
      <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
    </div>
    <div class="explore-log" id="explore-log"><div class="log-entry system">— 探索を開始する —</div></div>
    <div class="party-bar">
      <div class="party-label">PARTY</div>
      <div class="party-list" id="party-list"></div>
    </div>
    <div class="explore-controls">
      <button class="btn primary" id="btn-explore-toggle" onclick="G.toggleExplore()">▶ 探索開始</button>
      <button class="btn warn" onclick="G.showScreen('screen-fusion')">⚗ 合体</button>
    </div>
  </div>

  <div id="screen-battle" class="screen">
    <div class="battle-header">
      <div class="battle-floor" id="battle-floor-text">B1F</div>
      <div class="battle-title" id="battle-title-text">ENCOUNTER</div>
    </div>
    <div class="battle-enemy-area">
      <div class="enemy-display"><div class="enemy-sprite" id="enemy-sprite">👿</div></div>
      <div class="enemy-info">
        <div class="enemy-name" id="enemy-name">???</div>
        <div class="enemy-tags">
          <span class="tag race-tag" id="enemy-race-tag">???</span>
          <span class="tag" id="enemy-attr-tag">???</span>
        </div>
        <div class="enemy-hp-wrap"><div class="enemy-hp-bar" id="enemy-hp-bar" style="width:100%"></div></div>
        <div class="enemy-hp-text" id="enemy-hp-text">HP: -- / --</div>
      </div>
    </div>
    <div class="battle-log-area"><div class="battle-log-text" id="battle-log">...</div></div>
    <div class="negotiate-panel" id="negotiate-panel">
      <div class="negotiate-title">▌ 交渉方法を選べ</div>
      <div class="negotiate-opts">
        <button class="btn"         onclick="G.doNegotiate('おだてる')">😊 おだてる（成功率：中）</button>
        <button class="btn warn"    onclick="G.doNegotiate('脅す')">😤 脅す（成功率：低）</button>
        <button class="btn success" onclick="G.doNegotiate('金で解決')">💰 マッカを渡す（成功率：高）</button>
        <button class="btn"         onclick="G.cancelNegotiate()">✕ キャンセル</button>
      </div>
    </div>
    <div class="battle-actions" id="battle-actions">
      <div class="action-row">
        <button class="btn primary" onclick="G.doAttack()">⚔ 攻撃</button>
        <button class="btn"         onclick="G.startNegotiate()">💬 話す</button>
      </div>
      <div class="action-row">
        <button class="btn"          onclick="G.doFlee()">🏃 逃げる</button>
        <button class="btn disabled" onclick="G.doSkill()">✨ スキル</button>
      </div>
    </div>
  </div>

  <div id="screen-fusion" class="screen">
    <div class="fusion-header">
      <button class="btn" style="padding:8px 12px;font-size:12px;" onclick="G.backToExplore()">← 戻る</button>
      <span class="fusion-header-title">⚗ 合体ラボ</span>
    </div>
    <div class="fusion-content">
      <div class="fusion-slots">

<script>
// ================================================================
// [BLOCK: META] バージョン情報
// HTMLコメントヘッダー / metaタグ / タイトル画面 の3点と同期させること
// ================================================================
const APP_VERSION = '0.3.3';
const APP_NAME    = 'DAEMON RIFT';

// ================================================================
// [BLOCK: DATA] マスターデータ・定数
// 将来の分割先: data.js
// ================================================================

// 悪魔マスターデータ — Phase 4 で 20 体以上に拡充予定
const DEMON_MASTER = [
  { id:1,  name:"ピクシー",        race:"妖精",   attr:"氷", emoji:"🧚", lv:1,  hp:30,  atk:8,  def:5,  spd:12, skills:["ブフ"],               rare:"C" },
  { id:2,  name:"スライム",        race:"妖精",   attr:"物", emoji:"🫧", lv:1,  hp:25,  atk:6,  def:8,  spd:8,  skills:["たたく"],             rare:"C" },
  { id:3,  name:"コボルド",        race:"妖精",   attr:"物", emoji:"🐺", lv:2,  hp:35,  atk:10, def:6,  spd:10, skills:["噛みつき"],           rare:"C" },
  { id:4,  name:"ジャックランタン",race:"鬼神",   attr:"炎", emoji:"🎃", lv:3,  hp:45,  atk:12, def:7,  spd:9,  skills:["アギ"],               rare:"C" },
  { id:5,  name:"ゾンビ",          race:"死霊",   attr:"呪", emoji:"🧟", lv:2,  hp:50,  atk:9,  def:10, spd:5,  skills:["腐敗"],               rare:"C" },
  { id:6,  name:"シャドウ",        race:"堕天使", attr:"呪", emoji:"👤", lv:4,  hp:40,  atk:14, def:6,  spd:14, skills:["呪縛"],               rare:"B" },
  { id:7,  name:"ケルベロス",      race:"幻魔",   attr:"炎", emoji:"🐕", lv:8,  hp:80,  atk:22, def:14, spd:11, skills:["アギラオ","噛みつき"],rare:"B" },
  { id:8,  name:"メデューサ",      race:"幻魔",   attr:"氷", emoji:"🐍", lv:7,  hp:70,  atk:18, def:12, spd:13, skills:["石化眼","ブフーラ"],  rare:"B" },
  { id:9,  name:"アスタロト",      race:"堕天使", attr:"呪", emoji:"👑", lv:12, hp:110, atk:30, def:18, spd:10, skills:["メギド","混乱"],      rare:"A" },
  { id:10, name:"セラフ",          race:"天使",   attr:"電", emoji:"😇", lv:10, hp:90,  atk:25, def:20, spd:15, skills:["ジオ","回復"],        rare:"A" },
];

// 属性相性テーブル（攻撃属性 → 防御属性: 倍率）
const AFFINITY = {
  "炎":{"炎":.5,"氷":2,"電":1,"物":1,"呪":1},
  "氷":{"炎":.5,"氷":.5,"電":2,"物":1,"呪":1},
  "電":{"炎":1,"氷":1,"電":.5,"物":1.5,"呪":1},
  "物":{"炎":1,"氷":1,"電":1,"物":1,"呪":1.5},
  "呪":{"炎":1,"氷":1,"電":1,"物":.5,"呪":.5},
};

// 合体テーブル（種族A+種族B → 生成悪魔ID）— Phase 4 で拡充予定
const FUSION_TABLE = {
  "妖精+鬼神":7,"妖精+死霊":6,"妖精+堕天使":8,
  "鬼神+死霊":9,"鬼神+幻魔":10,
  "死霊+幻魔":9,"死霊+天使":10,"堕天使+天使":10,
};

// エリア定義（深度帯）
const AREAS = [
  {minFloor:1, name:"廃都表層"},{minFloor:11,name:"地下街区"},
  {minFloor:31,name:"冥界回廊"},{minFloor:61,name:"虚無の底"},
];

// ================================================================
// [BLOCK: STATE] ゲーム状態
//
// SAVE_KEYS: localStorageに保存するフィールド名の一覧
//   新規フィールド追加時はここへの追記要否を必ず確認すること
//
// ランタイム専用（保存不要）:
//   exploring / exploreTimer / inBattle / currentEnemy /
//   fusionSlot / fusionA / fusionB
//
// 将来の分割先: state.js
// ================================================================
const SAVE_KEYS = ['floor','macca','kills','fusions','bestFloor','party','storage'];

const STATE = {
  // セーブ対象
  floor:1, macca:100, kills:0, fusions:0, bestFloor:1,
  party:[], storage:[],
  // ランタイム専用（セーブ対象外）
  floorProgress:0,
  exploring:false, exploreTimer:null,
  inBattle:false, currentEnemy:null,
  fusionSlot:null, fusionA:null, fusionB:null,
};

// ================================================================
// [BLOCK: UTIL] 汎用ユーティリティ
// 将来の分割先: util.js
// ================================================================
function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function chance(rate){return Math.random()<rate}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
function showToast(msg,duration=2000){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),duration);
}

// ================================================================
// [BLOCK: ENGINE] ゲームロジック（純粋計算・データ操作）
// UIに依存しない処理のみ記述する
// 将来の分割先: engine.js
// ================================================================

// マスターデータからレベルスケール済みの悪魔インスタンスを生成する
function createDemon(masterId,overrideLv=null){
  const m=DEMON_MASTER.find(d=>d.id===masterId);
  if(!m)return null;
  const lv=overrideLv??m.lv, s=1+(lv-1)*0.12;
  return{
    uid:Date.now()+Math.random(),masterId:m.id,
    name:m.name,race:m.race,attr:m.attr,emoji:m.emoji,rare:m.rare,lv,
    skills:[...m.skills],
    maxHp:Math.floor(m.hp*s),hp:Math.floor(m.hp*s),
    atk:Math.floor(m.atk*s),def:Math.floor(m.def*s),spd:Math.floor(m.spd*s),
    exp:0,expNext:lv*20,inParty:false,
  };
}

// フロアに応じた敵悪魔を生成する（isBoss=true でボス倍率を適用）
function spawnEnemy(floor,isBoss=false){
  const pool=DEMON_MASTER.filter(d=>d.lv<=Math.ceil(floor/3)+2);
  const base=pool[rand(0,pool.length-1)];
  const lv=clamp(rand(floor,floor+2),1,50);
  const s=(1+(floor-1)*0.08)*(isBoss?2.5:1);
  return{
    name:isBoss?`【BOSS】${base.name}`:base.name,
    race:base.race,attr:base.attr,emoji:base.emoji,
    isBoss,skills:[...base.skills],lv,masterId:base.id,
    maxHp:Math.floor(base.hp*s),hp:Math.floor(base.hp*s),
    atk:Math.floor(base.atk*s),def:Math.floor(base.def*s),
  };
}

// ダメージ計算（属性相性・分散込み）
function calcDamage(att,def){
  const base=Math.max(1,att.atk-def.def*0.4);
  const aff=AFFINITY[att.attr]?.[def.attr]??1;
  return Math.floor(base*aff*(0.85+Math.random()*0.3));
}

// 交渉成功率を返す
function calcNegotiateRate(playerLv,enemyLv,tactic){
  const base={"おだてる":.45,"脅す":.25,"金で解決":.65};
  return clamp((base[tactic]??.4)+(playerLv-enemyLv)*0.05,0.05,0.9);
}

// 合体結果のプレビューを返す（合体不可なら null）
function getFusionResult(a,b){
  const rid=FUSION_TABLE[`${a.race}+${b.race}`]??FUSION_TABLE[`${b.race}+${a.race}`];
  if(!rid)return null;
  const base=DEMON_MASTER.find(d=>d.id===rid);
  if(!base)return null;
  return{masterId:rid,name:base.name,emoji:base.emoji,
    lv:Math.floor((a.lv+b.lv)/2)+1,skill:chance(.5)?a.skills[0]:b.skills[0]};
}

// レベルアップ処理（STATEの悪魔オブジェクトを直接更新する）
function applyLevelUp(demon){
  demon.lv++;demon.exp=0;demon.expNext=demon.lv*20;
  demon.maxHp+=rand(3,6);demon.hp=demon.maxHp;
  demon.atk+=rand(1,2);demon.def+=rand(1,2);
}

// ================================================================
// [BLOCK: SAVE] セーブ・ロード処理
// 将来の分割先: save.js
// ================================================================
const LS_KEY_SAVE='daemonrift_save';
const LS_KEY_BEST='daemonrift_best';
// セーブデータの構造が変わった際はここを上げる（旧データを破棄して再起動）
const SAVE_SCHEMA_VERSION=1;

// SAVE_KEYS に列挙されたフィールドのみを localStorage に保存する
function saveGame(){
  const data={_sv:SAVE_SCHEMA_VERSION};
  SAVE_KEYS.forEach(k=>{data[k]=STATE[k]});
  localStorage.setItem(LS_KEY_SAVE,JSON.stringify(data));
}

// バリデーション:
//   1. JSONパース失敗 → null
//   2. スキーマバージョン不一致 → null（旧データを安全に捨てる）
//   3. SAVE_KEYS のいずれかが欠損 → null
function loadGame(){
  const raw=localStorage.getItem(LS_KEY_SAVE);
  if(!raw)return null;
  try{
    const data=JSON.parse(raw);
    if(data._sv!==SAVE_SCHEMA_VERSION){
      console.warn(`[SAVE] スキーマ不一致 (saved:${data._sv} / current:${SAVE_SCHEMA_VERSION}) — リセット`);
      localStorage.removeItem(LS_KEY_SAVE);return null;
    }
    const missing=SAVE_KEYS.filter(k=>!(k in data));
    if(missing.length){console.warn('[SAVE] 欠損キー:',missing);return null;}
    return data;
  }catch(e){console.error('[SAVE] パース失敗:',e);return null;}
}

// 最大到達深度を STATE と localStorage の両方に記録する
function updateBestFloor(){
  if(STATE.floor>STATE.bestFloor)STATE.bestFloor=STATE.floor;
  const prev=parseInt(localStorage.getItem(LS_KEY_BEST)??'0');
  if(STATE.bestFloor>prev)localStorage.setItem(LS_KEY_BEST,STATE.bestFloor);
}

// ================================================================
// [BLOCK: UI] UI描画・DOM操作
// 責務: STATE / ENGINE の結果をDOMに反映するのみ（ロジック非依存）
// Phase 3 でアニメーション・エフェクト処理を追加予定
// 将来の分割先: ui.js
// ================================================================
const UI = {

  // 探索画面を最新 STATE で全更新する
  renderExplore() {
    document.getElementById('floor-display').textContent = `B${STATE.floor}F`;
    document.getElementById('macca-display').textContent = STATE.macca;
    document.getElementById('progress-bar').style.width = `${(STATE.floorProgress / 5) * 100}%`;
    document.getElementById('progress-label-num').textContent = `${STATE.floorProgress} / 5`;
    document.getElementById('progress-label-text').textContent = STATE.floor % 10 === 0 ? '⚠ ボスフロア' : 'フロア進行';

  // パーティバーを描画する
  renderPartyBar() {

  // 敵スプライトのヒットアニメーションを再生する
  playEnemyHitAnim() {
    const s = document.getElementById('enemy-sprite');

  // 合体ラボ画面を描画する
  renderFusionScreen() {
    const { fusionA: sA, fusionB: sB } = STATE;
    const fillSlot = (side, d) => {
      const el = document.getElementById(`fusion-slot-${side}`);
      if (d) {
        el.classList.add('filled');

      } else {
        el.classList.remove('filled');
        document.getElementById(`fusion-slot-${side}-emoji`).textContent = '＋';

      content.appendChild(el);
    });
  },
};

// ================================================================
// [BLOCK: AUDIO] BGM・SE 手続き型生成（Web Audio API）
// 責務: 外部ファイル不要・AudioContext 1インスタンスで全音を生成
// ミュート状態は localStorage に保存し起動時に復元する
// 将来の分割先: audio.js
// ================================================================
const AUDIO = (() => {
  let ctx = null;
  let bgmNode = null;       // 現在再生中のBGMノード群
  let bgmGain = null;       // BGMマスターゲイン
  let muted = localStorage.getItem('daemonrift_mute') === '1';

  // AudioContext を遅延初期化（ユーザー操作後に生成）
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  }

  // 単発オシレーター再生ヘルパー
  function playTone(freq, type, gain, duration, startDelay = 0) {
    if (muted) return;
    const c = getCtx();
    const osc = c.createOscillator();
    const g   = c.createGain();
    osc.connect(g); g.connect(c.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, c.currentTime + startDelay);
    g.gain.setValueAtTime(gain, c.currentTime + startDelay);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + startDelay + duration);
    osc.start(c.currentTime + startDelay);
    osc.stop(c.currentTime + startDelay + duration);
  }

  // BGM停止ヘルパー
  function stopBgm() {
    if (bgmNode) {
      bgmNode.forEach(n => { try { n.stop(); } catch(_) {} });
      bgmNode = null;
    }
    if (bgmGain) { try { bgmGain.disconnect(); } catch(_) {} bgmGain = null; }
  }

  return {
    get isMuted() { return muted; },

    toggleMute() {
      muted = !muted;
      localStorage.setItem('daemonrift_mute', muted ? '1' : '0');
      if (muted) stopBgm();
      else AUDIO.playBgmExplore();
      return muted;
    },

    // --- BGM ---
    playBgmExplore() {
      stopBgm();
      if (muted) return;
      const c = getCtx();
      bgmGain = c.createGain();
      bgmGain.gain.value = 0.06;
      bgmGain.connect(c.destination);

      // 廃都の雰囲気：低音ドローン＋微かなメロディ
      const drones = [55, 82.4, 110];  // A1, E2, A2
      bgmNode = drones.map(freq => {
        const osc = c.createOscillator();
        const lfo = c.createOscillator();
        const lfoGain = c.createGain();
        lfo.frequency.value = 0.15 + Math.random() * 0.1;
        lfoGain.gain.value = 2;
        lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        osc.connect(bgmGain);
        lfo.start(); osc.start();
        return osc;
      });
    },

    playBgmBattle(isBoss = false) {
      stopBgm();
      if (muted) return;
      const c = getCtx();
      bgmGain = c.createGain();
      bgmGain.gain.value = isBoss ? 0.09 : 0.07;
      bgmGain.connect(c.destination);

      // 戦闘：緊張感のある高速ドローン
      const freqs = isBoss ? [110, 146.8, 164.8] : [130.8, 164.8, 196];
      bgmNode = freqs.map((freq, i) => {
        const osc = c.createOscillator();
        osc.type = i === 0 ? 'square' : 'sawtooth';
        osc.frequency.value = freq;
        const g = c.createGain(); g.gain.value = i === 0 ? 0.5 : 0.3;
        osc.connect(g); g.connect(bgmGain);
        osc.start(); return osc;
      });
    },

    stopBgm,

    // --- SE ---
    seAttack() {
      // 攻撃：短いパンチ音
      playTone(220, 'square', 0.3, 0.08);
      playTone(180, 'sawtooth', 0.2, 0.12, 0.05);
    },

    seHit() {
      // 被ダメージ：低音インパクト
      playTone(80, 'sawtooth', 0.35, 0.15);
      playTone(60, 'square', 0.2, 0.2, 0.05);
    },

    seWeakness() {
      // 弱点ヒット：高音＋フラッシュ感
      playTone(440, 'square', 0.25, 0.06);
      playTone(660, 'square', 0.2,  0.06, 0.06);
      playTone(880, 'square', 0.15, 0.08, 0.12);
    },

    seLevelUp() {
      // レベルアップ：上昇アルペジオ
      [262, 330, 392, 523].forEach((f, i) => playTone(f, 'square', 0.2, 0.12, i * 0.08));
    },

    seNegotiateSuccess() {
      // 交渉成功：明るい2音
      playTone(523, 'triangle', 0.25, 0.15);
      playTone(659, 'triangle', 0.2,  0.2, 0.15);
    },

    seFusion() {
      // 合体：神秘的な上昇音
      [196, 247, 294, 370, 494].forEach((f, i) => playTone(f, 'sine', 0.18, 0.2, i * 0.1));
    },

    seDefeat() {
      // 全滅：下降音
      [220, 196, 165, 131, 110].forEach((f, i) => playTone(f, 'sawtooth', 0.25, 0.2, i * 0.12));
    },

    seFloorUp() {
      // 階層上昇：短いファンファーレ
      [392, 494, 587].forEach((f, i) => playTone(f, 'square', 0.18, 0.15, i * 0.1));
    },

    seFlee() {
      // 逃走：下降グリッサンド
      playTone(330, 'sawtooth', 0.2, 0.08);
      playTone(262, 'sawtooth', 0.15, 0.1, 0.08);
    },
  };
})();

// ================================================================
// [BLOCK: ANIM] アニメーション・エフェクト
// 責務: CSS class の付け外し・DOM エフェクト生成
// ゲームロジックを持たず、UIの視覚的な演出のみを担う
// Phase 3 で追加する全エフェクトをここに集約する
// 将来の分割先: anim.js
// ================================================================
const ANIM = {

  // 画面遷移：フェードイン
  screenIn(screenId) {
    const el = document.getElementById(screenId);
    if (!el) return;
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.2s ease';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => { el.style.opacity = '1'; });
    });
  },

  // 戦闘：攻撃フラッシュ（属性カラー対応）
  attackFlash(attr) {
    const colors = {
      '炎':'#e67e22','氷':'#00d4ff','電':'#f1c40f',
      '物':'#bdc3c7','呪':'#8e44ad',
    };
    const color = colors[attr] ?? '#fff';
    const flash = document.createElement('div');
    flash.style.cssText = `
      position:fixed;inset:0;background:${color};
      opacity:0.18;pointer-events:none;z-index:999;
      animation:none;transition:opacity 0.15s ease;
    `;
    document.body.appendChild(flash);
    requestAnimationFrame(() => {
      flash.style.opacity = '0';
      setTimeout(() => flash.remove(), 200);
    });
  },

  // 戦闘：弱点ヒット時の大フラッシュ
  weaknessFlash() {
    const flash = document.createElement('div');
    flash.style.cssText = `
      position:fixed;inset:0;background:#fff;
      opacity:0.35;pointer-events:none;z-index:999;
      transition:opacity 0.1s ease;
    `;
    document.body.appendChild(flash);
    requestAnimationFrame(() => {
      flash.style.opacity = '0';
      setTimeout(() => flash.remove(), 150);
    });
  },

  // 戦闘：ダメージ数値をフロートさせる
  floatDamage(dmg, isWeakness = false) {
    const battle = document.getElementById('enemy-sprite');
    if (!battle) return;
    const el = document.createElement('div');
    el.textContent = `-${dmg}`;
    el.style.cssText = `
      position:absolute;font-size:${isWeakness ? '24px' : '18px'};
      font-weight:bold;color:${isWeakness ? '#f1c40f' : '#fff'};
      text-shadow:0 0 6px rgba(0,0,0,.8);
      pointer-events:none;z-index:100;
      left:50%;top:20%;transform:translateX(-50%);
      animation:floatUp 0.8s ease forwards;
    `;
    const wrap = battle.closest('.enemy-area') ?? document.getElementById('screen-battle');
    wrap.style.position = 'relative';
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 900);
  },

  // レベルアップ：バナー表示
  levelUpBanner(name) {
    const el = document.createElement('div');
    el.textContent = `✨ ${name} LEVEL UP!`;
    el.style.cssText = `
      position:fixed;top:30%;left:50%;transform:translateX(-50%);
      background:rgba(241,196,15,.95);color:#000;
      font-size:16px;font-weight:bold;padding:10px 24px;
      border-radius:4px;z-index:1000;pointer-events:none;
      animation:bannerPop 1.4s ease forwards;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  },

  // 合体演出：オーバーレイ
  fusionEffect(resultName, resultEmoji) {
    const overlay = document.createElement('div');
    overlay.style.cssText = `
      position:fixed;inset:0;background:rgba(0,0,0,.85);
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;z-index:1000;
      animation:fadeIn 0.3s ease forwards;
    `;
    overlay.innerHTML = `
      <div style="font-size:64px;animation:fusionSpin 0.6s ease">${resultEmoji}</div>
      <div style="font-size:20px;color:var(--gold);margin-top:16px;font-weight:bold">
        ${resultName}
      </div>
      <div style="font-size:13px;color:var(--muted);margin-top:8px">誕生！</div>
    `;
    document.body.appendChild(overlay);
    setTimeout(() => {
      overlay.style.transition = 'opacity 0.3s';
      overlay.style.opacity = '0';
      setTimeout(() => overlay.remove(), 350);
    }, 1200);
  },

  // ゲームオーバー：画面シェイク
  screenShake() {
    const app = document.getElementById('app');
    app.style.animation = 'none';
    void app.offsetWidth;
    app.style.animation = 'shake 0.5s ease';
    setTimeout(() => { app.style.animation = ''; }, 600);
  },
};

// ================================================================
// [BLOCK: CONTROLLER] ゲームコントローラ
// ユーザー入力の受け口・画面遷移・ENGINE と UI の橋渡し
// 外部から直接呼び出し想定外のメソッドは _ プレフィックスで区別する
// 将来の分割先: controller.js
// ================================================================

// ================================================================
// [BLOCK: BATTLE] 戦闘ロジック
// 責務: 戦闘ループ・ダメージ処理・交渉・ゲームオーバー判定
// UIへのアクセスは最小限（setBattleLog / renderXxx 呼び出しのみ）
// 将来の分割先: battle.js
// ================================================================
const BATTLE = {

  // 戦闘画面を開く（探索ループから呼ばれる）
  open(enemy) {
    STATE.inBattle = true;
    STATE.currentEnemy = enemy;
    document.getElementById('battle-floor-text').textContent = `B${STATE.floor}F`;
    document.getElementById('battle-title-text').textContent = enemy.isBoss ? '⚠ BOSS BATTLE' : 'ENCOUNTER';
    const sp = document.getElementById('enemy-sprite');
    sp.textContent = enemy.emoji;
    sp.className = `enemy-sprite${enemy.isBoss ? ' boss' : ''}`;
    document.getElementById('enemy-name').textContent = enemy.name;
    document.getElementById('enemy-race-tag').textContent = enemy.race;
    const at = document.getElementById('enemy-attr-tag');
    at.textContent = enemy.attr;
    at.className = `tag attr-${enemy.attr}`;
    renderEnemyHP();
    setBattleLog(`${enemy.name} が立ちはだかる！`);
    document.getElementById('negotiate-panel').classList.remove('active');
    document.getElementById('battle-actions').style.display = '';
    AUDIO.playBgmBattle(enemy.isBoss);
    G.showScreen('screen-battle');
  },

  attack() {
    const e = STATE.currentEnemy, lead = STATE.party.find(d => d.hp > 0);
    if (!lead || !e) return;
    const dmg = calcDamage(lead, e);
    e.hp -= dmg;
    const aff = AFFINITY[lead.attr]?.[e.attr] ?? 1;
    let msg = `${lead.name}の攻撃！ ${dmg}ダメージ`;
    if (aff >= 2) msg += '（弱点！）'; else if (aff <= 0.5) msg += '（耐性あり）';
    setBattleLog(msg);
    AUDIO.seAttack();
    if (aff >= 2) { AUDIO.seWeakness(); ANIM.weaknessFlash(); } else { ANIM.attackFlash(lead.attr); }
    ANIM.floatDamage(dmg, aff >= 2);
    playEnemyHitAnim();
    renderEnemyHP();
    if (e.hp <= 0) { BATTLE._enemyDefeated(); return; }
    setTimeout(() => BATTLE._enemyAttack(), 600);
  },

  skill() {
    const e = STATE.currentEnemy, lead = STATE.party.find(d => d.hp > 0);
    if (!lead || !e || !lead.skills.length) return;
    const dmg = Math.floor(calcDamage(lead, e) * 1.5);
    e.hp -= dmg;
    setBattleLog(`${lead.name}の「${lead.skills[0]}」！ ${dmg}ダメージ`);
    AUDIO.seAttack();
    ANIM.attackFlash(lead.attr);
    ANIM.floatDamage(dmg);
    playEnemyHitAnim();
    renderEnemyHP();
    if (e.hp <= 0) { BATTLE._enemyDefeated(); return; }
    setTimeout(() => BATTLE._enemyAttack(), 600);
  },

  flee() {
    if (chance(0.6)) {
      STATE.inBattle = false;
      AUDIO.seFlee();
      setBattleLog('うまく逃げ切った！');
      setTimeout(() => { addLog('戦闘から逃げた', 'warn'); G.showScreen('screen-explore'); renderExplore(); AUDIO.playBgmExplore(); }, 800);
    } else {
      setBattleLog('逃げられなかった！');
      setTimeout(() => BATTLE._enemyAttack(), 600);
    }
  },

  startNegotiate() {
    if (STATE.currentEnemy?.isBoss) { showToast('ボスと交渉できない！'); return; }
    document.getElementById('negotiate-panel').classList.add('active');
    document.getElementById('battle-actions').style.display = 'none';
  },

  cancelNegotiate() {
    document.getElementById('negotiate-panel').classList.remove('active');
    document.getElementById('battle-actions').style.display = '';
  },

  negotiate(tactic) {
    const e = STATE.currentEnemy, lead = STATE.party.find(d => d.hp > 0);
    if (!lead || !e) return;
    if (tactic === '金で解決') {
      const cost = rand(10, 20 + e.lv * 3);
      if (STATE.macca < cost) { showToast(`₪が足りない（必要: ${cost}）`); return; }
      STATE.macca -= cost;
    }
    document.getElementById('negotiate-panel').classList.remove('active');
    document.getElementById('battle-actions').style.display = '';
    if (chance(calcNegotiateRate(lead.lv, e.lv, tactic))) {
      const nd = createDemon(e.masterId, e.lv);
      if (STATE.party.length < 3) {
        nd.inParty = true; STATE.party.push(nd);
        setBattleLog(`${e.name}は仲間になった！（パーティ加入）`);
      } else {
        STATE.storage.push(nd);
        setBattleLog(`${e.name}は仲間になった！（倉庫へ）`);
      }
      AUDIO.seNegotiateSuccess();
      addLog(`${e.name}が仲魔になった！`, 'success');
      STATE.inBattle = false;
      STATE.floorProgress = Math.max(0, STATE.floorProgress - 1);
      saveGame();
      setTimeout(() => { G.showScreen('screen-explore'); renderExplore(); AUDIO.playBgmExplore(); }, 1200);
    } else {
      setBattleLog(`${e.name}は激怒した！`);
      setTimeout(() => BATTLE._enemyAttack(), 600);
    }
  },

  _enemyAttack() {
    const e = STATE.currentEnemy, t = STATE.party.find(d => d.hp > 0);
    if (!t) { BATTLE._checkGameOver(); return; }
    const dmg = calcDamage(e, t);
    t.hp = Math.max(0, t.hp - dmg);
    AUDIO.seHit();
    setBattleLog(`${e.name}の反撃！ ${t.name}に${dmg}ダメージ`);
    renderPartyBar();
    if (t.hp <= 0) {
      setBattleLog(`${t.name} は倒れた…`);
      if (STATE.party.every(d => d.hp <= 0)) setTimeout(() => BATTLE._checkGameOver(), 1000);
    }
  },

  _enemyDefeated() {
    const e = STATE.currentEnemy;
    const mg = rand(10, 20 + STATE.floor * 2);
    const eg = rand(5, 10 + STATE.floor);
    STATE.macca += mg;
    STATE.kills++;
    STATE.party.filter(d => d.hp > 0).forEach(d => {
      d.exp += eg;
      if (d.exp >= d.expNext) { applyLevelUp(d); addLog(`${d.name} Lv${d.lv}にレベルアップ！`, 'success'); AUDIO.seLevelUp(); ANIM.levelUpBanner(d.name); }
    });
    setBattleLog(`${e.name}を倒した！ +${mg}₪`);
    playEnemyHitAnim();
    if (STATE.floorProgress >= 5 || e.isBoss) {
      STATE.floor++;
      STATE.floorProgress = 0;
      updateBestFloor();
      addLog(`B${STATE.floor}Fへ進んだ`, 'system');
    }
    saveGame();
    STATE.inBattle = false;
    setTimeout(() => { G.showScreen('screen-explore'); renderExplore(); AUDIO.playBgmExplore(); }, 1200);
  },

  _checkGameOver() {
    if (!STATE.party.every(d => d.hp <= 0)) return;
    clearInterval(STATE.exploreTimer);
    STATE.inBattle = STATE.exploring = false;
    AUDIO.seDefeat();
    AUDIO.stopBgm();
    ANIM.screenShake();
    document.getElementById('go-floor').textContent   = `B${STATE.floor}F`;
    document.getElementById('go-best').textContent    = `B${STATE.bestFloor}F`;
    document.getElementById('go-kills').textContent   = STATE.kills;
    document.getElementById('go-fusions').textContent = STATE.fusions;
    G.showScreen('screen-gameover');
  },
};


// ================================================================
// [BLOCK: FUSION] 合体・パーティ編成ロジック
// 責務: スロット選択・合体実行・スキル継承・パーティ入れ替え
// UIへのアクセスは最小限（renderXxx 呼び出しのみ）
// 将来の分割先: fusion.js
// ================================================================
const FUSION = {

  selectSlot(slot) {
    STATE.fusionSlot = slot;
    renderFusionScreen();
  },

  selectDemon(uid) {
    const d = [...STATE.party, ...STATE.storage].find(x => x.uid === uid);
    if (!d) return;
    if (STATE.fusionSlot === 'a') {
      if (STATE.fusionB?.uid === uid) { showToast('同じ悪魔は選べない'); return; }
      STATE.fusionA = d;
    } else {
      if (STATE.fusionA?.uid === uid) { showToast('同じ悪魔は選べない'); return; }
      STATE.fusionB = d;
    }
    STATE.fusionSlot = null;
    renderFusionScreen();
  },

  execute() {
    const { fusionA: a, fusionB: b } = STATE;
    if (!a || !b) return;
    const preview = getFusionResult(a, b);
    if (!preview) { showToast('この組み合わせは合体できない'); return; }
    // 素材を party / storage から除去
    STATE.party   = STATE.party.filter(d => d.uid !== a.uid && d.uid !== b.uid);
    STATE.storage = STATE.storage.filter(d => d.uid !== a.uid && d.uid !== b.uid);
    // 結果悪魔を生成しスキル継承
    const result = createDemon(preview.masterId, preview.lv);
    result.skills = [preview.skill];
    // パーティ空きがあれば加入、なければ倉庫へ
    if (STATE.party.length < 3) { result.inParty = true; STATE.party.push(result); }
    else { STATE.storage.push(result); }
    STATE.fusions++;
    STATE.fusionA = STATE.fusionB = null;
    addLog(`合体成功！ ${a.name} × ${b.name} → ${result.name} Lv${result.lv}`, 'success');
    AUDIO.seFusion();
    ANIM.fusionEffect(result.name, result.emoji);
    saveGame();
    renderFusionScreen();
    renderPartyBar();
  },

  toggleParty(uid) {
    const all = [...STATE.party, ...STATE.storage];
    const d = all.find(x => x.uid == uid);
    if (!d) return;
    if (d.inParty) {
      d.inParty = false;
      STATE.party = STATE.party.filter(x => x.uid != uid);
      STATE.storage.push(d);
      showToast(`${d.name} をパーティから外した`);
    } else {
      if (STATE.party.length >= 3) { showToast('パーティは最大3体'); return; }
      d.inParty = true;
      STATE.storage = STATE.storage.filter(x => x.uid != uid);
      STATE.party.push(d);
      showToast(`${d.name} をパーティに加えた`);
    }
    saveGame();
    renderPartyScreen();
    renderPartyBar();
  },
};

const G={
  showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id==='screen-fusion') UI.renderFusionScreen();
    if(id==='screen-party')  UI.renderPartyScreen();
  },
  backToExplore(){G.showScreen('screen-explore');},

  startNewGame(){
    clearInterval(STATE.exploreTimer);
    Object.assign(STATE,{floor:1,macca:100,kills:0,fusions:0,bestFloor:1,
      floorProgress:0,exploring:false,exploreTimer:null,
      party:[],storage:[],fusionA:null,fusionB:null});
    const s=createDemon(1,1);s.inParty=true;
    STATE.party=[s];STATE.storage=[createDemon(4,2)];
    updateBestFloor();G.showScreen('screen-explore');renderExplore();
    addLog('新たな探索者が廃都へ踏み込んだ…','system');
    addLog(`初期仲魔：${s.name} を連れている`,'success');
  },

  continueGame(){
    const data=loadGame();
    if(!data){showToast('セーブデータが見つからない');return;}
    SAVE_KEYS.forEach(k=>{STATE[k]=data[k];});
    STATE.exploring=false;
    G.showScreen('screen-explore');renderExplore();
    addLog('探索を再開した…','system');
  },

  toggleExplore(){
    if(!STATE.party.length||STATE.party.every(d=>d.hp<=0)){showToast('仲魔がいない！');return;}
    STATE.exploring=!STATE.exploring;
    if(STATE.exploring){STATE.exploreTimer=setInterval(G._exploreStep,2000);addLog('探索を開始した…','system');AUDIO.playBgmExplore();}
    else{clearInterval(STATE.exploreTimer);addLog('探索を停止した','system');AUDIO.stopBgm();}
    renderExplore();
  },

  _exploreStep(){
    STATE.floorProgress++;
    const boss=STATE.floor%10===0;
    if(STATE.floorProgress>=5||boss){
      STATE.exploring=false;clearInterval(STATE.exploreTimer);
      const e=spawnEnemy(STATE.floor,boss);STATE.currentEnemy=e;
      addLog(boss?`⚠ ボス出現！ ${e.name}が立ちはだかった！`:`! ${e.name}が現れた！`,boss?'boss':'encounter');
      renderExplore();setTimeout(()=>G._openBattle(e),800);
    }else{
      const gain=rand(3,8+STATE.floor);STATE.macca+=gain;STATE.kills++;
      const auto=spawnEnemy(STATE.floor);
      addLog(`${auto.name} を自動討伐（+${gain}₪）`);renderExplore();
    }
  },

  _openBattle(enemy){ BATTLE.open(enemy); },

  doAttack(){ BATTLE.attack(); },

  doSkill(){ BATTLE.skill(); },

  doFlee(){ BATTLE.flee(); },

  startNegotiate(){ BATTLE.startNegotiate(); },
  cancelNegotiate(){ BATTLE.cancelNegotiate(); },
  doNegotiate(tactic){ BATTLE.negotiate(tactic); },



  selectFusionSlot(slot){ FUSION.selectSlot(slot); },
  selectFusionDemon(uid){  FUSION.selectDemon(uid); },
  executeFusion(){         FUSION.execute(); },
  toggleParty(uid){        FUSION.toggleParty(uid); },
};

// [BLOCK: INIT] 起動処理

(function init(){
  document.getElementById('title-version').textContent=`v${APP_VERSION}`;
  if(loadGame())document.getElementById('btn-continue').style.display='';
})();
</script>
